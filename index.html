.login-container {
    background: #ffffff;
    width: 100%;
    max-width: 440px;
    padding: 32px 32px 28px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    border-radius: 0;
}

/* Header */
.header {
    background: none;
    padding: 0;
    margin-bottom: 24px;
    gap: 12px;
}

.header img {
    width: 32px;
}

.header h1 {
    font-size: 20px;
    font-weight: 600;
    color: #1b1b1b;
}

.instructions {
    margin-bottom: 8px;
}

input[type="email"],
input[type="password"] {
    margin-bottom: 16px;
}

.footer {
    margin-top: 22px;
}

.verified {
    font-size: 13px;
    font-weight: 400;
    color: #107c10;
    margin-bottom: 20px;
}

.verified .dot {
    width: 8px;
    height: 8px;
}

input[type="email"],
input[type="password"] {
    width: 100%;
    padding: 10px 0;
    margin-bottom: 18px;
    border: none;
    border-bottom: 1px solid #605e5c;
    font-size: 15px;
    color: #1b1b1b;
    background: transparent;
}

input::placeholder {
    color: #605e5c;
}

input:focus {
    outline: none;
    border-bottom: 2px solid #0067b8;
}

.login-button {
    background: #4f8edc;
    color: #ffffff;
    padding: 12px 24px;
    font-size: 16px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    margin-top: 8px;
}

.login-button:hover {
    background: #005da6;
}

/* Security icon */
.security {
    margin-top: 22px;
}

.security img {
    width: 64px;
    opacity: 0.85;
}

/* Footer */
.footer {
    text-align: left;
    margin-top: 26px;
    font-size: 12px;
    font-weight: 400;
    color: #605e5c;
}

/* Logo */
.logo {
    width: 120px;
    margin-bottom: 28px;
    border-radius: 0;
}
</style>
